rules:

  # ── Hardcoded secrets ──────────────────────────────────────────────────────

  - id: mcpb-hardcoded-api-key
    patterns:
      - pattern: $VAR = "$SECRET"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(api_?key|secret|token|password|passwd|auth|credential)
      - metavariable-regex:
          metavariable: $SECRET
          regex: .{8,}
    message: "Possible hardcoded secret in variable '$VAR'"
    languages: [python]
    severity: ERROR

  - id: mcpb-hardcoded-bearer-token
    pattern: |
      "Authorization": "Bearer $TOKEN"
    message: "Hardcoded Bearer token in source"
    languages: [python]
    severity: ERROR

  # ── Dangerous execution ────────────────────────────────────────────────────

  - id: mcpb-subprocess-shell-true
    patterns:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
    message: "subprocess called with shell=True — command injection risk"
    languages: [python]
    severity: ERROR

  - id: mcpb-os-system
    pattern: os.system(...)
    message: "os.system() allows arbitrary shell command execution"
    languages: [python]
    severity: ERROR

  - id: mcpb-dynamic-import
    pattern: __import__(...)
    message: "Dynamic import can load arbitrary modules"
    languages: [python]
    severity: WARNING

  # ── Data exfiltration ──────────────────────────────────────────────────────

  - id: mcpb-requests-post-external
    patterns:
      - pattern: requests.post($URL, ...)
      - pattern: httpx.post($URL, ...)
    message: "Outbound HTTP POST — verify endpoint is expected"
    languages: [python]
    severity: WARNING

  - id: mcpb-socket-connect
    pattern: $SOCK.connect(($HOST, $PORT))
    message: "Raw socket connection — potential data exfiltration channel"
    languages: [python]
    severity: WARNING

  # ── Credential harvesting ──────────────────────────────────────────────────

  - id: mcpb-environ-mass-harvest
    pattern: dict(os.environ)
    message: "Copying entire os.environ — potential credential harvesting"
    languages: [python]
    severity: ERROR

  - id: mcpb-environ-items
    pattern: os.environ.items()
    message: "Iterating all environment variables — review if necessary"
    languages: [python]
    severity: WARNING

  # ── Prompt injection ───────────────────────────────────────────────────────

  - id: mcpb-prompt-injection-ignore
    pattern-regex: '(?i)ignore\s+(previous|prior|above|all)\s+(instructions|prompt|rules|context)'
    message: "Possible prompt injection: 'ignore previous instructions' pattern in string"
    languages: [python]
    severity: ERROR

  # ── Unsafe deserialization ─────────────────────────────────────────────────

  - id: mcpb-unsafe-deserialize
    patterns:
      - pattern: pickle.$METHOD(...)
      - metavariable-regex:
          metavariable: $METHOD
          regex: (loads|load|Unpickler)
    message: "Unsafe deserialization — can execute arbitrary code on untrusted input"
    languages: [python]
    severity: ERROR

  - id: mcpb-marshal-loads
    pattern: marshal.loads(...)
    message: "Unsafe deserialization via marshal module"
    languages: [python]
    severity: ERROR

  # ── File system risk ───────────────────────────────────────────────────────

  - id: mcpb-write-to-system-path
    patterns:
      - pattern: open("/etc/...", ...)
      - pattern: open("/usr/...", ...)
      - pattern: open("/bin/...", ...)
    message: "Writing to system path — potential privilege escalation"
    languages: [python]
    severity: ERROR

  # ── JavaScript / TypeScript ─────────────────────────────────────────────────

  - id: mcpb-js-hardcoded-secret
    patterns:
      - pattern-either:
          - pattern: const $VAR = "$SECRET"
          - pattern: let $VAR = "$SECRET"
          - pattern: var $VAR = "$SECRET"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(api_?key|secret|token|password|auth|credential)
      - metavariable-regex:
          metavariable: $SECRET
          regex: .{8,}
    message: "Possible hardcoded secret in variable '$VAR'"
    languages: [javascript, typescript]
    severity: ERROR

  - id: mcpb-js-hardcoded-bearer
    pattern: |
      "Authorization": "Bearer $TOKEN"
    message: "Hardcoded Bearer token in source"
    languages: [javascript, typescript]
    severity: ERROR

  - id: mcpb-js-child-process
    pattern: require("child_process")
    message: "child_process usage — potential arbitrary command execution"
    languages: [javascript, typescript]
    severity: WARNING

  - id: mcpb-js-process-env-spread
    pattern-either:
      - pattern: "{...process.env}"
      - pattern: Object.assign({}, process.env)
    message: "Copying entire process.env — potential credential harvesting"
    languages: [javascript, typescript]
    severity: ERROR

  - id: mcpb-js-axios-post
    pattern: axios.post($URL, ...)
    message: "Outbound HTTP POST via axios — verify endpoint is expected"
    languages: [javascript, typescript]
    severity: WARNING

  # ── SSRF (Server-Side Request Forgery) ─────────────────────────────────────

  - id: mcpb-ssrf-requests-get
    patterns:
      - pattern: requests.get($URL, ...)
      - pattern-not: requests.get("...", ...)
    message: "requests.get() with dynamic URL — SSRF risk if URL is attacker-controlled"
    languages: [python]
    severity: WARNING

  - id: mcpb-ssrf-httpx-get
    patterns:
      - pattern: httpx.get($URL, ...)
      - pattern-not: httpx.get("...", ...)
    message: "httpx.get() with dynamic URL — SSRF risk if URL is attacker-controlled"
    languages: [python]
    severity: WARNING

  - id: mcpb-ssrf-urllib
    patterns:
      - pattern-either:
          - pattern: urllib.request.urlopen($URL)
          - pattern: urllib.request.urlopen($URL, ...)
      - pattern-not: urllib.request.urlopen("...", ...)
    message: "urllib.request.urlopen() with dynamic URL — SSRF risk"
    languages: [python]
    severity: WARNING

  - id: mcpb-ssrf-requests-post-dynamic
    patterns:
      - pattern: requests.post($URL, ...)
      - pattern-not: requests.post("...", ...)
    message: "requests.post() with dynamic URL — SSRF risk if URL is attacker-controlled"
    languages: [python]
    severity: WARNING

  # ── DNS Rebinding ───────────────────────────────────────────────────────────

  - id: mcpb-dns-rebinding-internal-url
    pattern-regex: '(https?://(localhost|127\.0\.0\.1|0\.0\.0\.0|::1|169\.254\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|192\.168\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+))'
    message: "Hardcoded internal/loopback URL — potential DNS rebinding or SSRF pivot target"
    languages: [python, javascript, typescript]
    severity: WARNING

  - id: mcpb-metadata-service-access
    pattern-regex: '169\.254\.169\.254'
    message: "Access to cloud metadata service IP (169.254.169.254) — credential theft risk"
    languages: [python, javascript, typescript]
    severity: ERROR

  # ── Open Redirect ───────────────────────────────────────────────────────────

  - id: mcpb-open-redirect-flask
    patterns:
      - pattern: redirect($URL)
      - pattern-not: redirect("...", ...)
    message: "redirect() with dynamic URL — open redirect vulnerability"
    languages: [python]
    severity: WARNING

  # ── JavaScript / TypeScript SSRF ────────────────────────────────────────────

  - id: mcpb-js-ssrf-fetch
    patterns:
      - pattern: fetch($URL, ...)
      - pattern-not: fetch("...", ...)
    message: "fetch() with dynamic URL — SSRF risk if URL is attacker-controlled"
    languages: [javascript, typescript]
    severity: WARNING

  - id: mcpb-js-ssrf-axios-get
    patterns:
      - pattern: axios.get($URL, ...)
      - pattern-not: axios.get("...", ...)
    message: "axios.get() with dynamic URL — SSRF risk if URL is attacker-controlled"
    languages: [javascript, typescript]
    severity: WARNING

  - id: mcpb-js-ssrf-axios-request
    patterns:
      - pattern: |
          axios({url: $URL, ...})
      - pattern-not: |
          axios({url: "...", ...})
    message: "axios() with dynamic URL — SSRF risk if URL is attacker-controlled"
    languages: [javascript, typescript]
    severity: WARNING

  # ── Path Traversal ──────────────────────────────────────────────────────────

  - id: mcpb-path-traversal-open
    patterns:
      - pattern: open(os.path.join($BASE, $USER_INPUT), ...)
      - pattern-not: open(os.path.join("...", "..."), ...)
    message: "open() with joined dynamic path — path traversal risk without normalization"
    languages: [python]
    severity: WARNING

  - id: mcpb-path-traversal-pathlib
    patterns:
      - pattern: ($P / $USER_INPUT).read_text(...)
      - pattern: ($P / $USER_INPUT).open(...)
    message: "Pathlib path join with dynamic segment — verify path is confined to expected directory"
    languages: [python]
    severity: WARNING
